name = "select-ask-analytics"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# KV 命名空间绑定（部署时需要创建）
# wrangler kv:namespace create STATS
# wrangler kv:namespace create STATS --preview
[[kv_namespaces]]
binding = "STATS"
id = "your-kv-namespace-id"  # 部署时替换

# 环境变量配置（敏感信息使用 wrangler secret put 命令设置）
# wrangler secret put DEEPSEEK_API_KEY
# wrangler secret put ADMIN_PASSWORD
[vars]
# ADMIN_PASSWORD = "your-admin-password"  # 建议使用 secret

# ========================================
# KV 配额监控与优化配置
# ========================================
#
# 【严重问题 #2 解决方案】KV写入配额风险
#
# Cloudflare KV 免费计划限制：
# - 读取：100,000 次/天
# - 写入：1,000 次/天
# - 列表：1,000 次/天
#
# 当前写入消耗分析：
# - 每次AI调用：1次写入（限流计数器）
# - 每次事件上报：2次写入（统计 + 总览）
# - KV监控：1次写入/操作
#
# 估算配额使用（假设监控开启）：
# - 34个设备 × 30次调用 = 1020次（超限！）
# - 加上统计上报：约1100+次写入
#
# 【解决方案】
# 方案A（推荐）：升级到 Workers Paid 计划（$5/月）
#   - 无限KV写入
#   - 更高性能
#   - 适合生产环境
#
# 方案B（当前）：配额监控 + 告警
#   - 已实现：monitorKVWrite() 函数
#   - 超过80%配额时打印警告
#   - 超过100%配额时打印错误日志
#   - 可通过日志监控服务（如Sentry）告警
#
# 方案C（未来优化）：批量写入
#   - 使用 Durable Objects 计数器
#   - 批量写入降低KV操作
#   - 需要额外配置和成本
#
# 【监控建议】
# 1. 使用 Cloudflare Analytics 查看日志
# 2. 配置日志推送（Logpush）到外部监控服务
# 3. 设置配额告警阈值（如Sentry、Datadog）
#
# 【降级策略】
# 如果KV写入配额耗尽：
# - 限流功能失效（可读取但无法写入计数）
# - 统计功能失效（无法记录新数据）
# - 建议在配额接近时发送通知切换到付费计划
#
# 免费额度：每天 10 万次请求，足够使用